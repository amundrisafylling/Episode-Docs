name: Build and Deploy DocFX Site
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
permissions:
  contents: read
 
env:
  # Set this to the path of your docfx.json (relative to repo root)
  DOCFX_CONFIG: "docfx.json"
  # Output folder defined in your docfx.json "dest" field
  DOCFX_OUTPUT: "_site"
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
 
      - name: Install DocFX
        run: dotnet tool install --global docfx
 
      - name: Build DocFX site
        run: docfx ${{ env.DOCFX_CONFIG }}
          
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURELOGIN }}
      
      - name: Upload to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --source "${{ env.DOCFX_OUTPUT }}" \
              --destination '$web' \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --auth-mode login \
              --overwrite true
      
      - name: Purge CDN
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az cdn endpoint purge \
                    --resource-group "${{ secrets.CDN_RESOURCE_GROUP }}" \
                    --profile-name "${{ secrets.CDN_PROFILE_NAME }}" \
                    --name "${{ secrets.CDN_ENDPOINT_NAME }}" \
                    --content-paths '/*' \
                    --no-wait
